name: Tests

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install networkx numpy matplotlib

      - name: Run tests
        run: python3 -m unittest discover tests

  mininet-tests:
    runs-on: ubuntu-latest
    container:
      image: ymlei/openoptics:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Run Mininet backend tests
        run: python3 -m unittest tests.test_backend.TestMininetBackendLinkBandwidth
